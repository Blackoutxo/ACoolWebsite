<DOCTYPE! html>
    <html>
        <head>
            <link rel="stylesheet" href="main.css">
            <meta charset="UTF-8" />
            <meta name="viewport" content="width=device-width, initial-scale=1.0" /> 
            <title> anvil </title>
        </head>
 
        <body>   

        <main class="game-layout">
           <aside class="stats-panel">
            <h2> Your Stats </h2>
            <div id="stats-items"> 
                <div class="Stats-item">
                    <div>
                        <h3> No Items! </h3>
                    </div>
                </div>
            </div>
           </aside>

           <section class="game-area">
                <h1> ANVIL </h1>
                <p>Money: $<span id="click-count">0</span></p>
                    <button id="anvil-btn">
                        <img src="assets/images/anvil.png" alt="where da anvil at ?" width="400"/>   
                    </button>
           </section>

             <aside class="shop-panel">
                <div id="shop-items">
                    <div class="shop-item"> 
                        <h3>Hammer</h3>
                        <p> More hammer = more hammering </p>
                        <button onclick="buyItem('Hammer')">Buy $10</button>
                    </div> 

                    <div class="shop-item">
                        <h3> Multiplier </h3>
                        <p> Will multiply by 2 money on every click </p>
                        <button onclick="buyItem('Multiplier')"> Buy $69</button>
                    </div>
                </div>
             </aside>

             <aside class="gamble-panel">
                <h3> Gamble </h3>
                <p> Do you have what it takes to go all in? </p>
                <button onClick="gambleIt()"> ALL IN </button>
            </aside>
        </main>

            <script src="script.js" defer></script>
        </body>
    </html>
